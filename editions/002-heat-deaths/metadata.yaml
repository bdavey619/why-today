hidden_question: "What is the deadliest natural disaster in America?"
surprising_sentence: >
  The CDC estimates roughly 1,200 Americans die of heat each year.
  Researchers who match death records against heat event dates find numbers closer to 12,000.
  The gap exists because heat deaths almost never appear on death certificates —
  a heart that fails at 3 a.m. in a 95-degree apartment is recorded as heart failure.

