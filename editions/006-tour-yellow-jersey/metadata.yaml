shared_moment: "The Tour de France begins Saturday in Lille — its first stage in three years on French soil, and the first edition of the race since the World Cup turned the country's attention to sport."

hidden_question: "Why is the Tour de France yellow?"

opening_paradox: "A closed newspaper has been leading the Tour de France for over a century."

surprising_sentence: "The Tour de France's yellow jersey gets its color from L'Auto, the newspaper that invented the race. L'Auto was shut down in 1944 as a Nazi collaborator. The jersey has been racing ever since."

object: "The yellow jersey — specifically its color, which was chosen in 1919 by Henri Desgrange because L'Auto printed on yellow paper."

emotional_register: wonder sharpening into irony
carry_type: conversation
perceptual_habit: "Trains readers to ask of any beloved tradition: what was this actually for, and does that origin still exist?"

concept: "Commercial inventions can outlive their commercial purpose entirely, becoming sacred objects whose origins are invisible to the people who love them most."

human_voice: "Eugène Christophe, 1919 — recalling spectators calling out: 'Ah, the yellow jersey! Isn't he beautiful, the canary? What are you doing, Madame Cri-Cri' — and noting 'that lasted the whole course.'"

visual: "Two-panel color artifact: L'Auto (1900–1944, faded yellow, 'Shuttered as a Nazi collaborator') beside Maillot Jaune (1919–present, same yellow, 'Still racing'). The shared color makes the argument before the reader reaches the body."

one_more_thing: "In 1930, Desgrange banned trade teams to purify his race. Needing replacement funding, he invented the caravane publicitaire — a promotional vehicle parade now beloved by spectators. He created what he hated."

