shared_moment: "Morocco plays France in the World Cup quarterfinal on Thursday — a rematch four years after Morocco's 2022 semifinal run became one of the most emotionally charged moments in sports history."

hidden_question: "How did France end up playing against itself?"

unresolved_opening: "Morocco plays France on Thursday. Six of Morocco's players were born in France."

surprising_sentence: "Morocco's 2026 World Cup squad has 26 players. Seven were born in Morocco. Nineteen were born elsewhere — six in France, six in Spain, three in the Netherlands, three in Belgium, one in Canada."

object: "Morocco's squad list — specifically the birthplaces of its 26 players, which trace the migration produced by 44 years of French colonial rule."

emotional_register: wonder sharpening into something heavier
carry_type: conversation

perceptual_habit: "Trains readers to ask of any national team — or national institution — what history produced the people inside it."

concept: "Colonial relationships don't end at independence. They continue as migration, language, and eventually as World Cup squads."

human_voice: "Walid Regragui, Morocco's head coach, born in Corbeil-Essonnes (Paris suburb): 'I was born in France, but nobody can have my heart for my country.' — after the 2022 quarterfinal win over Spain."

visual: "26-box origin grid, one box per player, colored by birth country. Morocco (7, dark red) is outnumbered by France (6, blue) + Spain (6, gold) combined. The visual shows the colonial map in squad form."

one_more_thing: "The 1998 French World Cup team — Zidane, Thuram, Desailly — was celebrated under the slogan black, blanc, beur: proof France's integration model was working. Twenty-eight years later, six of those Arab players' equivalents are lining up for Morocco instead."

