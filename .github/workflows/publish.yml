name: Publish to bdavey.co/why-today

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout why-today
        uses: actions/checkout@v4
        with:
          path: why-today

      - name: Checkout bdavey619.github.io
        uses: actions/checkout@v4
        with:
          repository: bdavey619/bdavey619.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: main-site

      - name: Sync docs/ into main-site/why-today/
        run: |
          rm -rf main-site/why-today
          cp -r why-today/docs main-site/why-today
          touch main-site/why-today/.nojekyll
          cat > main-site/why-today/DO-NOT-EDIT.md << 'EOF'
          # Do not edit this folder

          This folder is auto-published from [bdavey619/why-today](https://github.com/bdavey619/why-today).

          Changes made here will be overwritten on the next push to that repo.
          Edit content in the why-today repository instead.
          EOF

      - name: Commit and push
        run: |
          cd main-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add why-today/
          git diff --cached --quiet && echo "No changes to publish." && exit 0
          git commit -m "Publish why-today [auto] $(date -u '+%Y-%m-%d')"
          git push
